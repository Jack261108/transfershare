name: Baidu Transfer Task

on:
  schedule:
    # 每六小时执行一次 (UTC时间)
    - cron: '0 */6 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  transfer:
    runs-on: ubuntu-latest
    env:
      BAIDU_COOKIES: ${{ secrets.BAIDU_COOKIES }}
      SHARE_URLS: ${{ secrets.SHARE_URLS }}
      SAVE_DIR: ${{ secrets.SAVE_DIR }}
      WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
      GITHUB_ACTIONS: 'true'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        cache: 'pip'
        cache-dependency-path: 'requirements.txt'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        python -m unittest discover -s tests -p "test_*.py"

    - name: Run transfer task (First attempt)
      id: first_attempt
      timeout-minutes: 7
      continue-on-error: true
      run: |
        echo "开始执行转存任务 (第一次尝试)"
        echo "超时时间: 7 分钟"
        echo "========================================"
        ./scripts/run_transfer_task.sh --show-network-info

    - name: Run transfer task (Second attempt)
      if: steps.first_attempt.outcome == 'failure'
      timeout-minutes: 10
      run: |
        echo "第一次尝试失败，开始第二次尝试"
        echo "超时时间: 10 分钟"
        echo "========================================"
        sleep 5
        ./scripts/run_transfer_task.sh
      