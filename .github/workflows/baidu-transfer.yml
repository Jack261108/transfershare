name: Baidu Transfer Task

on:
  schedule:
    # 每两小时执行一次 (UTC时间)
    - cron: '0 */2 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  transfer:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run transfer task
      env:
        BAIDU_COOKIES: ${{ secrets.BAIDU_COOKIES }}
        SHARE_URLS: ${{ secrets.SHARE_URLS }}
        SAVE_DIR: ${{ secrets.SAVE_DIR }}
        WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
        # GitHub Actions环境标识
        GITHUB_ACTIONS: 'true'
      run: |
        # 设置网络超时参数
        export PYTHONUNBUFFERED=1
        # 显示网络信息
        echo "网络环境信息:"
        curl -s https://ipinfo.io/json || echo "无法获取IP信息"
        # 执行转存任务
        python transfer_runner.py